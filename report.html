<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球AI晨报</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* Top Nav */
    .top-nav {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-nav a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .top-nav a:hover { color: var(--accent-hover); }
    .top-nav .sep { color: var(--text-muted); }
    .top-nav .date { color: var(--text); font-weight: 600; }

    /* Content */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* Markdown Styles */
    .md-body h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent);
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .md-body h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 36px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--accent);
    }
    .md-body h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 10px;
      color: var(--text);
    }
    .md-body h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 18px;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .md-body p { margin-bottom: 12px; }
    .md-body strong { color: #f0f6fc; font-weight: 600; }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body ul, .md-body ol { margin-bottom: 12px; padding-left: 24px; }
    .md-body li { margin-bottom: 4px; }
    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 12px 0;
      background: rgba(88, 166, 255, 0.06);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
    }
    .md-body code {
      background: #1c2128;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'SF Mono', Consolas, monospace;
      color: #f0f6fc;
    }
    .md-body pre {
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin-bottom: 14px;
    }
    .md-body pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
    }
    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .md-body th {
      background: #1c2128;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--accent);
    }
    .md-body td {
      padding: 8px 12px;
      border: 1px solid var(--border);
    }
    .md-body tr:nth-child(even) { background: rgba(22, 27, 34, 0.6); }
    .md-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .loading .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      text-align: center;
      padding: 60px 20px;
      color: #f85149;
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <a href="index.html">🏠 首页</a>
    <span class="sep">/</span>
    <span class="date" id="navDate">加载中...</span>
  </div>
  <div class="content">
    <div id="mdContent" class="md-body">
      <div class="loading"><div class="spinner"></div><p style="margin-top:16px">正在加载晨报...</p></div>
    </div>
  </div>
  <script>
    async function loadReport() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file');
      if (!file) {
        document.getElementById('mdContent').innerHTML = '<div class="error">❌ 未指定晨报文件</div>';
        return;
      }

      const dateMatch = file.match(/(\d{4}-\d{2}-\d{2})/);
      if (dateMatch) {
        document.getElementById('navDate').textContent = dateMatch[1] + ' AI晨报';
        document.title = '全球AI晨报 | ' + dateMatch[1];
      }

      try {
        const resp = await fetch('reports/' + file);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const md = await resp.text();
        const html = DOMPurify.sanitize(marked.parse(md, { breaks: true, gfm: true }));
        document.getElementById('mdContent').innerHTML = html;
      } catch (e) {
        document.getElementById('mdContent').innerHTML =
          '<div class="error">❌ 加载失败：' + e.message + '<br><a href="index.html" style="color:var(--accent)">返回首页</a></div>';
      }
    }
    loadReport();
  </script>
</body>
</html>
