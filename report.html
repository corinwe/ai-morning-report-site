  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1a2332;
      --border: #1e2d3d;
      --border-light: #2a3a4a;
      --text: #e2e8f0;
      --text-muted: #8899aa;
      --text-dim: #5a6a7a;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --accent-bg: rgba(59,130,246,0.08);
      --green: #10b981;
      --orange: #f59e0b;
      --red: #ef4444;
      --purple: #a78bfa;
      --pink: #f472b6;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans SC', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* ===== Top Navigation ===== */
    .top-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .top-bar .left { display: flex; align-items: center; gap: 10px; }
    .top-bar a {
      color: var(--accent-light);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .top-bar a:hover { color: var(--accent); }
    .top-bar .sep { color: var(--text-dim); font-size: 0.8rem; }
    .top-bar .current-date { font-weight: 600; color: var(--text); font-size: 0.9rem; }
    .top-bar .right { display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 32px; height: 32px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.85rem;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent-light); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn:disabled:hover { border-color: var(--border); color: var(--text-muted); }

    /* ===== Layout: Sidebar + Content ===== */
    .layout {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - 52px);
    }

    /* ===== Sidebar TOC ===== */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      padding: 24px 0 24px 20px;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .toc-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-left: 12px;
    }
    .toc-link {
      display: block;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      border-radius: 0 6px 6px 0;
      transition: all 0.15s;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toc-link:hover { color: var(--text); background: var(--surface2); }
    .toc-link.active {
      color: var(--accent-light);
      border-left-color: var(--accent);
      background: var(--accent-bg);
      font-weight: 500;
    }
    .toc-link.h3 { padding-left: 24px; font-size: 0.75rem; }

    /* ===== Content ===== */
    .content {
      flex: 1;
      min-width: 0;
      padding: 30px 32px 60px;
      border-left: 1px solid var(--border);
    }

    /* ===== Markdown Styles ===== */
    .md-body h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--accent);
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }
    .md-body h2 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-top: 40px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      color: var(--accent-light);
      scroll-margin-top: 68px;
    }
    .md-body h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 12px;
      color: var(--text);
      scroll-margin-top: 68px;
    }
    .md-body h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 8px;
      color: var(--text-muted);
      scroll-margin-top: 68px;
    }
    .md-body p { margin-bottom: 12px; color: var(--text); }
    .md-body strong { color: #f8fafc; font-weight: 600; }
    .md-body em { color: var(--accent-light); }
    .md-body a { color: var(--accent-light); text-decoration: none; border-bottom: 1px solid transparent; }
    .md-body a:hover { border-bottom-color: var(--accent); }
    .md-body ul, .md-body ol { margin-bottom: 12px; padding-left: 24px; }
    .md-body li { margin-bottom: 4px; }
    .md-body li::marker { color: var(--text-dim); }

    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 18px;
      margin: 16px 0;
      background: var(--accent-bg);
      border-radius: 0 8px 8px 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .md-body blockquote strong { color: var(--accent-light); font-style: normal; }

    .md-body code {
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.86em;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      color: var(--pink);
      border: 1px solid var(--border);
    }
    .md-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      margin: 14px 0;
    }
    .md-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 0.84em;
    }

    .md-body table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 16px 0;
      font-size: 0.88rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .md-body th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border-light);
      color: var(--accent-light);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .md-body td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
    }
    .md-body tr:last-child td { border-bottom: none; }
    .md-body tr:hover td { background: rgba(59,130,246,0.03); }
    .md-body td strong { color: var(--accent-light); }

    .md-body hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-light), transparent);
      margin: 32px 0;
    }

    /* ===== Key Signal Table Highlight ===== */
    .md-body h2 + table td:first-child strong { color: var(--orange); }

    /* ===== Loading & Error ===== */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--red);
    }
    .error-state a { color: var(--accent-light); }

    /* ===== Back to Top ===== */
    .back-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 40px; height: 40px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
      z-index: 100;
    }
    .back-top.visible { opacity: 1; }
    .back-top:hover { border-color: var(--accent); color: var(--accent-light); }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px 40px; border-left: none; }
      .md-body h1 { font-size: 1.6rem; }
      .md-body h2 { font-size: 1.15rem; }
      .md-body table { font-size: 0.8rem; }
      .md-body th, .md-body td { padding: 7px 10px; }
    }
  </style>
</head>

let currentDate = '';
let currentIndex = 0;

// ===== Navigation =====
function initNav() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  if (!file) return;
  currentIndex = REPORT_LIST.findIndex(r => r.file === file);
  if (currentIndex < 0) currentIndex = 0;

  const report = REPORT_LIST[currentIndex];
  currentDate = report?.date || '';
  document.getElementById('navDate').textContent = currentDate + ' AI晨报';
  document.title = '全球AI晨报 | ' + currentDate;

  document.getElementById('prevDay').disabled = (currentIndex >= REPORT_LIST.length - 1);
  document.getElementById('nextDay').disabled = (currentIndex <= 0);

  document.getElementById('prevDay').addEventListener('click', () => {
    if (currentIndex < REPORT_LIST.length - 1) {
      window.location.href = 'report.html?file=' + encodeURIComponent(REPORT_LIST[currentIndex + 1].file);
    }
  });
  document.getElementById('nextDay').addEventListener('click', () => {
    if (currentIndex > 0) {
      window.location.href = 'report.html?file=' + encodeURIComponent(REPORT_LIST[currentIndex - 1].file);
    }
  });
}

// ===== TOC =====
function buildTOC() {
  const tocEl = document.getElementById('tocList');
  const headings = document.querySelectorAll('.md-body h2, .md-body h3');
  let html = '';
  headings.forEach((h, i) => {
    const id = 'sec-' + i;
    h.id = id;
    const isH3 = h.tagName === 'H3';
    const text = h.textContent.trim();
    html += `<a class="toc-link${isH3 ? ' h3' : ''}" href="#${id}" data-id="${id}">${text}</a>`;
  });
  tocEl.innerHTML = html;

  // Click to scroll
  tocEl.querySelectorAll('.toc-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(link.dataset.id);
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });
}

function updateActiveTOC() {
  const headings = document.querySelectorAll('.md-body h2, .md-body h3');
  let activeId = '';
  headings.forEach(h => {
    if (h.getBoundingClientRect().top <= 100) {
      activeId = h.id;
    }
  });
  document.querySelectorAll('.toc-link').forEach(link => {
    link.classList.toggle('active', link.dataset.id === activeId);
  });
}

// ===== Load Report =====
async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  if (!file) {
    document.getElementById('mdContent').innerHTML = '<div class="error-state">❌ 未指定晨报文件<br><a href="index.html">返回目录</a></div>';
    return;
  }
  try {
    const resp = await fetch('reports/' + file);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const md = await resp.text();
    const html = DOMPurify.sanitize(marked.parse(md, { breaks: true, gfm: true }));
    document.getElementById('mdContent').innerHTML = html;
    buildTOC();
  } catch (e) {
    document.getElementById('mdContent').innerHTML =
      '<div class="error-state">❌ 加载失败：' + e.message + '<br><a href="index.html">返回目录</a></div>';
  }
}

// ===== Back to Top =====
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backTop');
  btn.classList.toggle('visible', window.scrollY > 400);
  updateActiveTOC();
});
document.getElementById('backTop').addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ===== Init =====
initNav();
loadReport();
